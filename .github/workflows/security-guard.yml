name: "Security: Block Workspace Exploits"

on:
  pull_request:
    branches: ['**']

jobs:
  security-scan:
    name: Block .vscode & malware patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for .vscode exploit files
        run: |
          echo "🔒 Security scan: checking for workspace exploit patterns..."
          VIOLATIONS=""
          
          # Check for .vscode directory
          if [ -d ".vscode" ]; then
            VIOLATIONS="$VIOLATIONS\n❌ .vscode/ directory found - this MUST be removed and added to .gitignore"
            echo "::error::Found .vscode/ directory - potential workspace exploit vector"
          fi
          
          # Check for tasks.json with runOn (the actual exploit trigger)
          if find . -path '*tasks.json' -exec grep -l '"runOn"' {} \; 2>/dev/null | grep -q .; then
            VIOLATIONS="$VIOLATIONS\n❌ tasks.json with 'runOn' auto-execution trigger found - THIS IS MALWARE"
            echo "::error::Found tasks.json with runOn trigger - confirmed malware pattern"
          fi
          
          # Check for fake font files (JS disguised as fonts)
          for f in $(find . -name "*.woff2" -o -name "*.woff" -o -name "*.ttf" -o -name "*.otf" 2>/dev/null); do
            if file "$f" | grep -qE "ASCII|text|script"; then
              VIOLATIONS="$VIOLATIONS\n❌ Fake font file detected: $f (JavaScript disguised as font)"
              echo "::error::Fake font file (malware payload): $f"
            fi
          done
          
          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════╗"
            echo "║  🚨 SECURITY VIOLATION - PUSH BLOCKED                       ║"
            echo "╠══════════════════════════════════════════════════════════════╣"
            echo "║                                                              ║"
            echo "║  Your code contains known malware patterns.                  ║"
            echo "║  This is likely from the VS Code workspace exploit           ║"
            echo "║  (runOn: folderOpen attack).                                 ║"
            echo "║                                                              ║"
            echo "║  TO FIX:                                                     ║"
            echo "║  1. Delete your .vscode/ folder: rm -rf .vscode              ║"
            echo "║  2. Delete fake fonts: rm public/fonts/fa-solid-400.woff2    ║"
            echo "║  3. Add .vscode/ to your .gitignore                          ║"
            echo "║  4. Run: git rm -r --cached .vscode/ 2>/dev/null             ║"
            echo "║  5. Commit and push again                                    ║"
            echo "║                                                              ║"
            echo "║  Contact your team lead for more information.                ║"
            echo "║                                                              ║"
            echo "╚══════════════════════════════════════════════════════════════╝"
            echo ""
            echo -e "$VIOLATIONS"
            exit 1
          fi
          
          echo "✅ Security scan passed - no workspace exploits detected"
